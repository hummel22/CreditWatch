version: '3.9'

services:
  creditwatch:
    build:
      context: ./backend
    volumes:
      - ./backend/data:/app/data
    environment:
      - UVICORN_WORKERS=1
    ports:
      - "8010:8010"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - creditwatch
    ports:
      - "5173:80"
